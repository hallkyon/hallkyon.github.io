<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta name="author" content="Jakob Haller" />
        <meta charset="utf-8" />
        <title>GraphNote</title>

        <link rel="stylesheet" href="./public/styles.css" />
        <script type="module" src="./public/dist/app.js"></script>
    </head>
    <body>
        <div class="main">
            <svg xmlns="http://www.w3.org/2000/svg" id="svg"></svg>
            <div class="editor-container">
                <div class="editor-header">
                    <input
                        type="text"
                        placeholder="title"
                        class="editor-title" />
                    <button class="editor-button">delete</button>
                    <button class="editor-button">close</button>
                </div>
                <textarea class="editor-content" spellcheck="false"></textarea>
            </div>
        </div>
        <footer>
            <button>create</button>
        </footer>
    </body>
</html>
